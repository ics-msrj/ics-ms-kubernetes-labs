{{/*
loadgenerator doesn't fit the generic-service.yaml loop either: it has an
init container (waits for frontend to answer before the main container
starts) and no Service of its own — it's a traffic source, not something
other services call.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgenerator
  labels:
    app: loadgenerator
    {{- include "online-boutique.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: loadgenerator
  replicas: 1
  template:
    metadata:
      labels:
        app: loadgenerator
    spec:
      serviceAccountName: loadgenerator
      terminationGracePeriodSeconds: 5
      restartPolicy: Always
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext.pod | nindent 8 }}
      initContainers:
        - name: frontend-check
          image: busybox:1.36.1
          securityContext:
            {{- toYaml .Values.securityContext.container | nindent 12 }}
          command:
            - /bin/sh
            - -exc
            - |
              MAX_RETRIES=12
              RETRY_INTERVAL=10
              for i in $(seq 1 $MAX_RETRIES); do
                echo "Attempt $i: Pinging frontend: ${FRONTEND_ADDR}..."
                STATUSCODE=$(wget --server-response http://${FRONTEND_ADDR} 2>&1 | awk '/^  HTTP/{print $2}')
                if [ $STATUSCODE -eq 200 ]; then
                    echo "Frontend is reachable."
                    exit 0
                fi
                echo "Error: Could not reach frontend - Status code: ${STATUSCODE}"
                sleep $RETRY_INTERVAL
              done
              echo "Failed to reach frontend after $MAX_RETRIES attempts."
              exit 1
          env:
            - name: FRONTEND_ADDR
              value: "frontend:80"
      containers:
        - name: main
          securityContext:
            {{- toYaml .Values.securityContext.container | nindent 12 }}
          image: {{ include "online-boutique.image" (dict "registry" .Values.image.registry "name" "loadgenerator" "tag" .Values.image.tag) }}
          env:
            - name: FRONTEND_ADDR
              value: "frontend:80"
            - name: USERS
              value: {{ .Values.loadgenerator.users | quote }}
            - name: RATE
              value: {{ .Values.loadgenerator.rate | quote }}
          resources:
            {{- toYaml .Values.loadgenerator.resources | nindent 12 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: loadgenerator
  labels:
    {{- include "online-boutique.labels" . | nindent 4 }}
