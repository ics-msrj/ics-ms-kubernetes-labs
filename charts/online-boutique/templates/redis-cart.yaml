{{/*
redis-cart as a StatefulSet with a PersistentVolumeClaim and Redis AUTH —
the same shape Modules 02/03/05 built up incrementally by hand. Packaged
here as one chart-managed unit instead. The Secret's password should always
be overridden at install time (--set redisCart.password=...) — the chart
default exists so `helm template`/`helm lint` don't fail on a required
value, not because it's safe to use.

redisCart.createSecret exists for GitOps consumers (Module 11): on a real
GKE deployment, ArgoCD overwrote this Secret's real, manually-rotated
password back to the chart's placeholder on sync — confirmed live, three
times, surviving ignoreDifferences, RespectIgnoreDifferences=true, AND
the argocd.argoproj.io/sync-options: Ignore annotation, none of which
actually stopped it. Setting createSecret=false skips this template
entirely so the Application can source the password from a SealedSecret
(Module 03's pattern) via a separate manifest instead — ArgoCD only ever
syncs ciphertext, so there's nothing plaintext for it to overwrite.
Defaults to true so every other consumer of this chart (Module 10,
native installs) is unaffected.
*/}}
{{- if .Values.redisCart.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: redis-cart-credentials
  labels:
    {{- include "online-boutique.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.redisCart.password | quote }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: redis-cart
  labels:
    app: redis-cart
    {{- include "online-boutique.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: redis-cart
  ports:
    - name: tcp-redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cart-headless
  labels:
    app: redis-cart
    {{- include "online-boutique.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app: redis-cart
  ports:
    - name: tcp-redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cart
  labels:
    app: redis-cart
    {{- include "online-boutique.labels" . | nindent 4 }}
spec:
  serviceName: redis-cart-headless
  replicas: 1
  selector:
    matchLabels:
      app: redis-cart
  template:
    metadata:
      labels:
        app: redis-cart
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext.pod | nindent 8 }}
      containers:
        - name: redis
          securityContext:
            {{- toYaml .Values.securityContext.container | nindent 12 }}
          image: redis:7.2.5-alpine
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-cart-credentials
                  key: password
          args:
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
          ports:
            - containerPort: 6379
          readinessProbe:
            periodSeconds: 5
            tcpSocket:
              port: 6379
          livenessProbe:
            periodSeconds: 5
            tcpSocket:
              port: 6379
          volumeMounts:
            - mountPath: /data
              name: redis-data
          resources:
            {{- toYaml .Values.redisCart.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.redisCart.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.redisCart.storageSize }}
# cartservice itself is deliberately NOT defined here — it's a normal entry
# in values.yaml's `services` list (see generic-service.yaml), just one
# whose env includes a valueFrom pulling the Secret defined above.
