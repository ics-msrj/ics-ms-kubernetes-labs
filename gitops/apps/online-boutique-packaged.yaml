# Child Application #1 — Helm source. Adopts the exact release Module 10's
# setup.sh created by hand (`helm install online-boutique
# charts/online-boutique -n online-boutique-packaged`) — same chart, same
# release name, same namespace. From here on, ArgoCD reconciles it instead
# of anyone running `helm upgrade` by hand.
#
# redis-cart-credentials: after THREE confirmed live overwrites via
# ignoreDifferences, RespectIgnoreDifferences=true, and the
# sync-options: Ignore annotation — none of which actually stopped
# argocd-controller from applying the chart's placeholder over the real
# password — this Application no longer sources the password from a
# Helm value at all. redisCart.createSecret=false skips that template
# entirely; the second source below applies a SealedSecret instead
# (Module 03's pattern). ArgoCD only ever syncs the encrypted
# ciphertext, so there's nothing plaintext for it to overwrite.
#
# helm.parameters below are this specific real deployment's own overrides
# (GKE: standard-rwo StorageClass, workload-pool nodeSelector) — matching
# what Module 10's setup.sh applied by hand via REDIS_STORAGE_CLASS/
# WORKLOAD_NODE_SELECTOR_KEY/_VALUE. A different target platform (native
# kubeadm, AKS) needs different values here or none at all.
#
# automated/selfHeal verified safe: two manual syncs in a row on the
# live cluster left the SealedSecret-managed password untouched both
# times (previously, one sync was enough to overwrite it under every
# prior approach). automated re-enabled below on that basis.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique-packaged
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/ics-msrj/ics-ms-kubernetes-labs.git
      targetRevision: main
      path: charts/online-boutique
      helm:
        releaseName: online-boutique
        parameters:
          - name: redisCart.storageClassName
            value: standard-rwo
          - name: nodeSelector.workload
            value: autoscale
          - name: redisCart.createSecret
            value: "false"
    - repoURL: https://github.com/ics-msrj/ics-ms-kubernetes-labs.git
      targetRevision: main
      path: gitops/sealed-secrets/online-boutique-packaged
  destination:
    server: https://kubernetes.default.svc
    namespace: online-boutique-packaged
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
