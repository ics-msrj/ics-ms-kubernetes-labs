# Child Application #1 — Helm source. Adopts the exact release Module 10's
# setup.sh created by hand (`helm install online-boutique
# charts/online-boutique -n online-boutique-packaged`) — same chart, same
# release name, same namespace. From here on, ArgoCD reconciles it instead
# of anyone running `helm upgrade` by hand.
#
# redis-cart-credentials is NOT protected here via ignoreDifferences —
# tried that first, it doesn't work. ignoreDifferences (even combined with
# the RespectIgnoreDifferences sync option) only suppresses the OutOfSync
# status/diff view; confirmed live, TWICE, that argocd-controller still
# overwrote the real random password with the chart's
# "changeme-override-at-install" placeholder on sync regardless. The
# actual fix lives on the Secret itself: the
# argocd.argoproj.io/sync-options: Ignore annotation in
# charts/online-boutique/templates/redis-cart.yaml, which excludes the
# resource from ArgoCD's sync/diff entirely. This is the same
# secrets-in-GitOps tension Module 03 solved with Sealed Secrets — a fully
# GitOps-native version of this Application would source the password
# from a SealedSecret instead of a Helm value at all.
#
# helm.parameters below are this specific real deployment's own overrides
# (GKE: standard-rwo StorageClass, workload-pool nodeSelector) — matching
# what Module 10's setup.sh applied by hand via REDIS_STORAGE_CLASS/
# WORKLOAD_NODE_SELECTOR_KEY/_VALUE. A different target platform (native
# kubeadm, AKS) needs different values here or none at all.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique-packaged
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ics-msrj/ics-ms-kubernetes-labs.git
    targetRevision: main
    path: charts/online-boutique
    helm:
      releaseName: online-boutique
      parameters:
        - name: redisCart.storageClassName
          value: standard-rwo
        - name: nodeSelector.workload
          value: autoscale
  destination:
    server: https://kubernetes.default.svc
    namespace: online-boutique-packaged
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
