# Child Application #2 — Kustomize source (auto-detected from the
# kustomization.yaml at this path; no source.kustomize block needed since
# this Application doesn't customize anything beyond what Module 10's
# overlay already defines). Adopts the same online-boutique-dev namespace
# Module 10's setup.sh applied by hand.
#
# Same redis-cart-credentials caveat as online-boutique-packaged.yaml — see
# that file's comment for why ignoreDifferences is deliberate here too.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ics-msrj/ics-ms-kubernetes-labs.git
    targetRevision: main
    path: kustomize/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: online-boutique-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: redis-cart-credentials
      jsonPointers:
        - /data
        - /stringData
