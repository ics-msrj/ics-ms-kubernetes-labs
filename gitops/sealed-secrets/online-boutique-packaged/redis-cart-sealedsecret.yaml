# Real, random redis-cart password, encrypted with this cluster's
# sealed-secrets-controller public key (kubeseal --controller-namespace
# kube-system --controller-name sealed-secrets-controller). Safe to
# commit: only that controller's private key, which never leaves the
# cluster, can decrypt spec.encryptedData.password. ArgoCD syncs this
# ciphertext freely — see gitops/apps/online-boutique-packaged.yaml for
# why that matters (plaintext Secret values got overwritten 3 times).
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: redis-cart-credentials
  namespace: online-boutique-packaged
spec:
  encryptedData:
    password: 
  template:
    metadata:
      name: redis-cart-credentials
      namespace: online-boutique-packaged
