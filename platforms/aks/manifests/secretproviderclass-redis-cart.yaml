# Replaces Module 03's Sealed Secrets flow for redis-cart's password.
# Secrets Store CSI Driver mounts the Key Vault secret as a file (via any
# Pod that references this class as a volume) AND syncs it into a native
# K8s Secret via secretObjects below — redis-cart-statefulset-with-auth.yaml
# and cartservice-with-redis-auth.yaml already expect that Secret
# (redis-cart-credentials, key "password"), so neither manifest changes.
#
# useVMManagedIdentity + userAssignedIdentityID authenticates as the Key
# Vault Secrets Provider add-on's own identity (Terraform's
# key_vault_secrets_provider block) directly via IMDS — not per-pod
# Workload Identity federation, which this repo doesn't set up. Using
# clientID alone (without useVMManagedIdentity) instead triggers a
# federated-credential token request that fails outright
# (AADSTS70025: no configured federated identity credentials) since no
# federation exists for this identity.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: redis-cart-secrets
  namespace: online-boutique
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "__KEYVAULT_SECRETS_PROVIDER_CLIENT_ID__"
    keyvaultName: "__KEY_VAULT_NAME__"
    tenantId: "__TENANT_ID__"
    objects: |
      array:
        - |
          objectName: redis-cart-password
          objectType: secret
  secretObjects:
    - secretName: redis-cart-credentials
      type: Opaque
      data:
        - objectName: redis-cart-password
          key: password
---
# Nothing mounts this SecretProviderClass's volume directly (redis-cart and
# cartservice only need the synced Secret above, via env vars) — the CSI
# driver only performs the Key Vault -> Secret sync while at least one Pod
# actively mounts it as a volume. This is that Pod: a minimal, otherwise
# do-nothing Deployment whose only job is to keep the mount (and therefore
# the sync + secret_rotation_enabled polling) alive.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cart-secrets-sync
  namespace: online-boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-cart-secrets-sync
  template:
    metadata:
      labels:
        app: redis-cart-secrets-sync
    spec:
      containers:
        - name: sync
          image: mcr.microsoft.com/oss/kubernetes/pause:3.10
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 20m
              memory: 16Mi
          volumeMounts:
            - name: secrets
              mountPath: "/mnt/secrets"
              readOnly: true
      volumes:
        - name: secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: redis-cart-secrets
