# HTTP Basic Auth in front of Kubecost's UI (port 9090) — same reasoning
# and pattern as opencost-authproxy.yaml (removed when Kubecost replaced
# OpenCost on this cluster): Kubecost has no built-in auth either, and
# this hostname is reachable through the Cloudflare Tunnel with no other
# access control in front of it. The .htpasswd credential lives in a
# Secret created imperatively (never committed, see the accompanying
# kubectl command), matching how every other real credential in this
# repo is handled.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubecost-authproxy-conf
  namespace: kubecost
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 8080;
        auth_basic "Kubecost";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;
        location / {
          proxy_pass http://kubecost-cost-analyzer.kubecost.svc.cluster.local:9090;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubecost-authproxy
  namespace: kubecost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubecost-authproxy
  template:
    metadata:
      labels:
        app: kubecost-authproxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: auth
              mountPath: /etc/nginx/auth
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: conf
          configMap:
            name: kubecost-authproxy-conf
        - name: auth
          secret:
            secretName: kubecost-authproxy-htpasswd
---
apiVersion: v1
kind: Service
metadata:
  name: kubecost-authproxy
  namespace: kubecost
spec:
  selector:
    app: kubecost-authproxy
  ports:
    - name: http
      port: 8080
      targetPort: 8080
