# Replaces enable-observability.sh's kubeseal-based Grafana admin password
# generation. Syncs into the same Secret name/keys the kube-prometheus-stack
# Helm values already reference (grafana.admin.existingSecret=
# grafana-admin-credentials, userKey=admin-user, passwordKey=admin-password)
# — no Helm value changes needed, only how that Secret gets created.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: grafana-admin-secrets
  namespace: monitoring
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "__KEYVAULT_SECRETS_PROVIDER_CLIENT_ID__"
    keyvaultName: "__KEY_VAULT_NAME__"
    tenantId: "__TENANT_ID__"
    objects: |
      array:
        - |
          objectName: grafana-admin-username
          objectType: secret
        - |
          objectName: grafana-admin-password
          objectType: secret
  secretObjects:
    - secretName: grafana-admin-credentials
      type: Opaque
      data:
        - objectName: grafana-admin-username
          key: admin-user
        - objectName: grafana-admin-password
          key: admin-password
---
# Same reasoning as redis-cart-secrets-sync — the CSI driver only syncs
# while something mounts this class. Grafana's own pod could mount it
# directly instead of using a throwaway sync pod, but that would mean
# patching kube-prometheus-stack's Grafana pod spec (a Helm-managed
# resource) — this is simpler and keeps the sync mechanism identical to
# redis-cart's.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-secrets-sync
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana-secrets-sync
  template:
    metadata:
      labels:
        app: grafana-secrets-sync
    spec:
      containers:
        - name: sync
          image: mcr.microsoft.com/oss/kubernetes/pause:3.10
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 20m
              memory: 16Mi
          volumeMounts:
            - name: secrets
              mountPath: "/mnt/secrets"
              readOnly: true
      volumes:
        - name: secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: grafana-admin-secrets
