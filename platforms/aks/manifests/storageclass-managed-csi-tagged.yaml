# AKS's built-in `managed-csi` StorageClass creates disks with no tags at
# all — this subscription's "ICS MS - Require tag: owner/managed_by/
# cost_center/environment/project" policies deny untagged disk creation
# outright, so any PVC on the stock `managed-csi` class gets stuck
# Pending forever (ProvisioningFailed). disk.csi.azure.com's StorageClass
# supports a `tags` parameter for exactly this. diskEncryptionSetID is set
# too, for the same CMK reason the cluster's own node disks use one — see
# platforms/aks/terraform/main.tf's disk_encryption_set_id.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: managed-csi-tagged
provisioner: disk.csi.azure.com
parameters:
  skuName: StandardSSD_LRS
  tags: "owner=ics-ms,managed_by=terraform,cost_center=nextops,environment=production,project=k8s-learning-lab"
  diskEncryptionSetID: "__DISK_ENCRYPTION_SET_ID__"
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
