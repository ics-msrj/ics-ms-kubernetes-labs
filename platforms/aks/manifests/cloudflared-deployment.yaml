# Cloudflare Tunnel connector. Runs in remotely-managed mode — the tunnel's
# public-hostname routing (which Cloudflare hostname maps to which internal
# Service) is configured once in the Cloudflare Zero Trust dashboard against
# the tunnel this token belongs to, not here. This manifest only runs the
# connector pods that keep the tunnel's outbound connection alive; it
# contains no secret material itself — TUNNEL_TOKEN comes from the
# cloudflared-token Secret, created imperatively by enable-cf-tunnel.sh
# from CF_TUNNEL_TOKEN in aks.env (gitignored, never committed).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflare-tunnel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.7.2
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: TUNNEL_TOKEN
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 10
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: cloudflared
                topologyKey: kubernetes.io/hostname
