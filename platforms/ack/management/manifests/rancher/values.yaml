# Public TLS terminates at Cloudflare. The tunnel forwards to this ClusterIP
# Service over HTTP inside the management cluster; no Ingress or public LB is
# created for Rancher.
networkExposure:
  type: none

ingress:
  enabled: false

service:
  type: ClusterIP
  disableHTTP: false

tls: external
agentTLSMode: system-store

replicas: 2
antiAffinity: preferred
topologyKey: kubernetes.io/hostname

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi
