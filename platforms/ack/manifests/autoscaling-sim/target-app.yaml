apiVersion: v1
kind: ServiceAccount
metadata:
  name: autoscale-target
  namespace: ack-autoscale-sim
  labels:
    app.kubernetes.io/name: autoscale-target
    app.kubernetes.io/part-of: ack-autoscale-simulation
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: autoscale-target-code
  namespace: ack-autoscale-sim
  labels:
    app.kubernetes.io/name: autoscale-target
    app.kubernetes.io/part-of: ack-autoscale-simulation
data:
  server.js: |
    const http = require('http');
    const workMs = Number.parseInt(process.env.CPU_WORK_MS || '45', 10);
    const port = Number.parseInt(process.env.PORT || '8080', 10);

    const yieldToEventLoop = () => new Promise((resolve) => setImmediate(resolve));

    async function cpuWork(durationMs) {
      const deadline = Date.now() + durationMs;
      let value = 0;

      // Yield regularly so probes remain an availability signal, not a victim
      // of the intentional CPU saturation used by the simulation.
      while (Date.now() < deadline) {
        const sliceDeadline = Math.min(deadline, Date.now() + 4);
        while (Date.now() < sliceDeadline) {
          value = (value + Math.sqrt(value + 1)) % 100000;
        }
        await yieldToEventLoop();
      }

      return value;
    }

    http.createServer(async (request, response) => {
      if (request.url === '/healthz' || request.url === '/readyz') {
        response.writeHead(200).end('ok\n');
        return;
      }

      const value = await cpuWork(workMs);
      response.writeHead(200, { 'Content-Type': 'application/json' });
      response.end(JSON.stringify({ ok: true, value }));
    }).listen(port, '0.0.0.0');
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscale-target
  namespace: ack-autoscale-sim
  labels:
    app.kubernetes.io/name: autoscale-target
    app.kubernetes.io/part-of: ack-autoscale-simulation
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: autoscale-target
  template:
    metadata:
      labels:
        app.kubernetes.io/name: autoscale-target
        app.kubernetes.io/part-of: ack-autoscale-simulation
    spec:
      serviceAccountName: autoscale-target
      automountServiceAccountToken: false
      nodeSelector:
        workload: autoscale
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: node:22.16.0-alpine
          imagePullPolicy: IfNotPresent
          command: ["node", "/app/server.js"]
          env:
            - name: PORT
              value: "8080"
            - name: CPU_WORK_MS
              value: "45"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 750m
              memory: 256Mi
            limits:
              cpu: 1500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: app-code
              mountPath: /app
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: app-code
          configMap:
            name: autoscale-target-code
            defaultMode: 0444
---
apiVersion: v1
kind: Service
metadata:
  name: autoscale-target
  namespace: ack-autoscale-sim
  labels:
    app.kubernetes.io/name: autoscale-target
    app.kubernetes.io/part-of: ack-autoscale-simulation
spec:
  selector:
    app.kubernetes.io/name: autoscale-target
  ports:
    - name: http
      port: 8080
      targetPort: http
