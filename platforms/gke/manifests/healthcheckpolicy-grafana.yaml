# GKE-specific — no AKS or native equivalent. GKE's regional external
# Gateway LB (gke-l7-regional-external-managed) health-checks each
# backend Service at GET / by default, expecting a plain 200. Grafana's
# root path 302-redirects to /login when unauthenticated (correct,
# expected Grafana behavior) — GCP's default HTTP health check treats
# any non-200 as UNHEALTHY, so the backend never came up (real 503s
# through the Gateway, confirmed live) until this policy pointed the
# check at /api/health instead, which returns a genuine 200 with
# {"database":"ok",...}.
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: grafana-healthcheck
  namespace: monitoring
spec:
  targetRef:
    group: ""
    kind: Service
    name: monitoring-grafana
  default:
    checkIntervalSec: 15
    timeoutSec: 15
    healthyThreshold: 1
    unhealthyThreshold: 2
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /api/health
        port: 3000
