# GKE equivalent of modules/08-observability/manifests/gateway-grafana-listener.yaml
# — identical except gatewayClassName. This is the FULL Gateway spec (not
# a patch): kubectl apply's 3-way merge replaces the whole listeners
# list, so Module 04's http/https listeners have to be repeated here
# too, same as the native file does.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: frontend-gateway
  namespace: online-boutique
  annotations:
    cert-manager.io/cluster-issuer: __TLS_ISSUER__
    # See manifests/gateway.yaml's own note — GKE's LB rejects a TLS cert
    # with an empty Subject, gateway-shim's default Certificate doesn't
    # set one. UNVERIFIED for this specific multi-listener/multi-cert
    # case: this annotation is Gateway-scoped, so it may apply the same
    # commonName to grafana-tls's Certificate too, which would be wrong
    # (should be __GRAFANA_DOMAIN__, not __APP_DOMAIN__). Check the
    # actual generated grafana-tls Certificate's subject after applying
    # this — if wrong, switch to an explicitly-created Certificate for
    # grafana-tls instead of relying on gateway-shim's auto-generation.
    cert-manager.io/common-name: __APP_DOMAIN__
spec:
  gatewayClassName: gke-l7-regional-external-managed
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: __APP_DOMAIN__
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      hostname: __APP_DOMAIN__
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: frontend-tls
      allowedRoutes:
        namespaces:
          from: Same
    - name: https-grafana
      protocol: HTTPS
      port: 443
      hostname: __GRAFANA_DOMAIN__
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: grafana-tls
      allowedRoutes:
        namespaces:
          from: All
