# GKE equivalent of modules/11-gitops-cicd/manifests/gateway-argocd-listener.yaml
# — same reasoning as gateway-grafana-listener.yaml: FULL listener set
# (Module 04's http/https + Module 08's https-grafana + this module's
# https-argocd), because kubectl apply's 3-way merge replaces the whole
# listeners list, not just appends to it. Same known limitation as
# gateway-grafana-listener.yaml: cert-manager.io/common-name is
# Gateway-scoped, so argocd-tls's Certificate gets frontend's commonName
# too — harmless (SAN is what TLS validation actually uses, and SAN is
# correct per-listener), not re-architected for the same reason.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: frontend-gateway
  namespace: online-boutique
  annotations:
    cert-manager.io/cluster-issuer: __TLS_ISSUER__
    cert-manager.io/common-name: __APP_DOMAIN__
spec:
  gatewayClassName: gke-l7-regional-external-managed
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: __APP_DOMAIN__
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      hostname: __APP_DOMAIN__
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: frontend-tls
      allowedRoutes:
        namespaces:
          from: Same
    - name: https-grafana
      protocol: HTTPS
      port: 443
      hostname: __GRAFANA_DOMAIN__
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: grafana-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-argocd
      protocol: HTTPS
      port: 443
      hostname: __ARGOCD_DOMAIN__
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: argocd-tls
      allowedRoutes:
        namespaces:
          from: All
