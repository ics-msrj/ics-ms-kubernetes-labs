# Applied and deleted manually only — proves the snapshot can actually be
# restored into a new, independent volume, not just that the
# VolumeSnapshot object exists. GKE equivalent of Module 05's own
# redis-cart-restore-test.template.yaml (storageClassName swapped).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-cart-restore-test
  namespace: online-boutique
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard-rwo
  dataSource:
    name: redis-cart-snapshot
    kind: VolumeSnapshot
    apiGroup: snapshot.storage.k8s.io
  resources:
    requests:
      storage: 1Gi
