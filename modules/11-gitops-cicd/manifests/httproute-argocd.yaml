# __ARGOCD_DOMAIN__ is substituted by setup.sh.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: frontend-gateway
      namespace: online-boutique
      sectionName: https-argocd
  hostnames:
    - "__ARGOCD_DOMAIN__"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
