# Static Helm values for ArgoCD — the admin password (bcrypt hash) is
# runtime-generated and passed separately via --set-string in setup.sh,
# never committed here.
configs:
  params:
    # ArgoCD terminates its own TLS by default. We terminate TLS at the
    # Gateway instead (cert-manager, same as Module 08's Grafana) and let
    # argocd-server speak plain HTTP behind it — this is ArgoCD's own
    # documented pattern for running behind an ingress/gateway that already
    # handles TLS, not a security downgrade.
    server.insecure: true
    # Initial adoption can reconcile both 36-object applications at once.
    # Keep that burst bounded on a small lab control plane.
    controller.operation.processors: 5
    controller.status.processors: 10
  cm:
    # ArgoCD's own repo-server runs `kustomize build` internally — without
    # this, it has no idea our overlays' helmCharts inflation (Module 10)
    # needs --enable-helm, and would fail to render online-boutique-dev.
    kustomize.buildOptions: "--enable-helm --load-restrictor LoadRestrictionsNone"
# Module 06 enforces CPU and memory requests and limits for every Pod. Keep
# the ArgoCD control plane modest for the lab while leaving headroom for repo
# rendering and reconciliation.
controller:
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

dex:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

redis:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

redisSecretInit:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

server:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

applicationSet:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

notifications:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
