apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: autoscale-target
  namespace: autoscale-sim
  labels:
    app.kubernetes.io/name: autoscale-target
    app.kubernetes.io/part-of: aks-autoscale-simulation
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autoscale-target
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: server
        minAllowed:
          cpu: 100m
          memory: 64Mi
        maxAllowed:
          cpu: 500m
          memory: 256Mi
        controlledResources: ["cpu", "memory"]
