apiVersion: v1
kind: ServiceAccount
metadata:
  name: autoscale-target
  namespace: autoscale-sim
  labels:
    app.kubernetes.io/name: autoscale-target
    app.kubernetes.io/part-of: aks-autoscale-simulation
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: autoscale-target-code
  namespace: autoscale-sim
  labels:
    app.kubernetes.io/name: autoscale-target
    app.kubernetes.io/part-of: aks-autoscale-simulation
data:
  server.js: |
    const http = require('http');
    const workMs = Number.parseInt(process.env.CPU_WORK_MS || '18', 10);
    const port = Number.parseInt(process.env.PORT || '8080', 10);

    http.createServer((request, response) => {
      if (request.url === '/healthz' || request.url === '/readyz') {
        response.writeHead(200).end('ok\n');
        return;
      }

      const deadline = Date.now() + workMs;
      let value = 0;
      while (Date.now() < deadline) value = (value + Math.sqrt(value + 1)) % 100000;
      response.writeHead(200, { 'Content-Type': 'application/json' });
      response.end(JSON.stringify({ ok: true, value }));
    }).listen(port, '0.0.0.0');
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscale-target
  namespace: autoscale-sim
  labels:
    app.kubernetes.io/name: autoscale-target
    app.kubernetes.io/part-of: aks-autoscale-simulation
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: autoscale-target
  template:
    metadata:
      labels:
        app.kubernetes.io/name: autoscale-target
        app.kubernetes.io/part-of: aks-autoscale-simulation
    spec:
      serviceAccountName: autoscale-target
      automountServiceAccountToken: false
      nodeSelector:
        workload: autoscale
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: node:22.16.0-alpine
          imagePullPolicy: IfNotPresent
          command: ["node", "/app/server.js"]
          env:
            - name: PORT
              value: "8080"
            - name: CPU_WORK_MS
              value: "18"
          ports:
            - name: http
              containerPort: 8080
          resources:
            # Apply values reviewed from VPA recommendations before running HPA.
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: app-code
              mountPath: /app
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: app-code
          configMap:
            name: autoscale-target-code
            defaultMode: 0444
---
apiVersion: v1
kind: Service
metadata:
  name: autoscale-target
  namespace: autoscale-sim
  labels:
    app.kubernetes.io/name: autoscale-target
    app.kubernetes.io/part-of: aks-autoscale-simulation
spec:
  selector:
    app.kubernetes.io/name: autoscale-target
  ports:
    - name: http
      port: 8080
      targetPort: http
