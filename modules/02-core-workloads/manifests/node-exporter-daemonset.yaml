# A DaemonSet: exactly one pod per node, automatically added/removed as
# nodes join/leave — unlike a Deployment, replica count isn't something you
# set. Prometheus Node Exporter is the canonical real-world use case: every
# node needs host-level metrics (CPU, memory, disk, network), so every node
# gets a copy. Module 08 (Observability) points Prometheus at these pods.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-exporter
  namespace: online-boutique
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: online-boutique
  labels:
    app: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      serviceAccountName: node-exporter
      hostNetwork: true
      hostPID: true
      # Runs on every node, including the control plane — host metrics from
      # the control plane matter too, and it's the only node this taint blocks.
      tolerations:
        - operator: Exists
      containers:
        - name: node-exporter
          image: quay.io/prometheus/node-exporter:v1.12.0
          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/pods/.+)($|/)
          ports:
            - containerPort: 9100
              hostPort: 9100
              name: metrics
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /host/root
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /
