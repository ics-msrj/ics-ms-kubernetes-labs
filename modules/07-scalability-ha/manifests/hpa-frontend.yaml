# minReplicas: 2 doubles as this module's PodDisruptionBudget prerequisite —
# a PDB with minAvailable: 1 is meaningless (or worse, blocks all voluntary
# disruption outright) against a Deployment that only ever runs 1 replica.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
  namespace: online-boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
