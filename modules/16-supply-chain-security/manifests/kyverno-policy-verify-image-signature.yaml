# Extends Module 06's Kyverno install — no new admission controller for
# this module, Kyverno already does image signature verification
# (verifyImages) alongside the policy-as-code rules it's already enforcing.
#
# Scoped to the supply-chain-demo namespace ONLY. This is deliberate, not a
# limitation: Online Boutique's real images (Google's, in online-boutique)
# aren't signed with a key this lab controls — a policy requiring our
# signature cluster-wide would immediately block every pod in this repo's
# main namespace.
#
# publicKeys below is a placeholder — setup.sh uses `yq` to overwrite it
# with the real public key content (freshly generated each run) rather than
# a text substitution, since sed/awk on a multi-line PEM block inside YAML
# is exactly the kind of fragile indentation bug not worth risking here.
#
# imageReferences is ALSO a placeholder, for a different reason: kubelet
# pulls images using the node's own DNS resolver (a separate network
# namespace from pods'), which can't resolve *.svc.cluster.local — only
# the registry Service's ClusterIP works for both the admission check
# (Kyverno, pod-network DNS) and the actual pull (kubelet). The
# ClusterIP is only known after the Service exists, so setup.sh
# overwrites this with the real one each run, same mechanism as
# publicKeys above.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-signed-images-supply-chain-demo
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: check-image-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - supply-chain-demo
      verifyImages:
        - imageReferences:
            - "PLACEHOLDER/*"
          # mutateDigest resolves the tag to the exact digest that was just
          # verified and rewrites the pod spec to reference THAT digest
          # instead of the mutable tag — closes the gap where the tag could
          # be repointed between this admission check and kubelet's actual
          # pull. verifyDigest stays false: it would instead REQUIRE the
          # incoming pod spec to already reference a digest, which would
          # break every tag-based example in this module's own README.
          mutateDigest: true
          verifyDigest: false
          required: true
          attestors:
            - count: 1
              entries:
                - keys:
                    publicKeys: "PLACEHOLDER"
                    # Required, not optional, for pure --key signing: Kyverno
                    # otherwise still tries to confirm the signature has a
                    # matching entry in Rekor (the PUBLIC sigstore
                    # transparency log) even when verification itself is
                    # entirely offline against a local public key — found
                    # live as "signature not found in transparency log",
                    # since this lab deliberately never uploads there
                    # (see setup.sh's --tlog-upload=false comment: a
                    # throwaway busybox test image has no business creating
                    # a permanent public record). ignoreTlog: true is
                    # cosign/Kyverno's own documented way to say that's
                    # expected for this verification mode, not a workaround.
                    rekor:
                      ignoreTlog: true
