# Redefines the 6 upstream Deployments that hardcode `DISABLE_PROFILER: "1"`
# inline, replacing that one env entry with `envFrom: configMapRef` pointing
# at online-boutique-shared-config. Everything else (image, ports, probes,
# resources, securityContext) is copied unchanged from the upstream manifest —
# `kubectl apply` performs a 3-way merge, so re-applying these on top of the
# upstream Deployments correctly removes the old inline env entry.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: currencyservice
  labels:
    app: currencyservice
spec:
  selector:
    matchLabels:
      app: currencyservice
  template:
    metadata:
      labels:
        app: currencyservice
    spec:
      serviceAccountName: currencyservice
      terminationGracePeriodSeconds: 5
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: server
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            privileged: false
            readOnlyRootFilesystem: true
          image: us-central1-docker.pkg.dev/google-samples/microservices-demo/currencyservice:v0.10.5
          ports:
            - name: grpc
              containerPort: 7000
          envFrom:
            - configMapRef:
                name: online-boutique-shared-config
          env:
            - name: PORT
              value: "7000"
          readinessProbe:
            grpc:
              port: 7000
          livenessProbe:
            grpc:
              port: 7000
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
