# Template only — DO NOT `kubectl apply` this file directly (the password
# below is a placeholder, not a real secret, and this file is intentionally
# safe to commit). setup.sh uses this shape to generate a real Secret with a
# random password in memory, pipes it through `kubeseal`, and applies the
# resulting SealedSecret instead. See modules/03-config-secrets/README.md
# for why a plain Secret never gets written to disk in this workflow.
apiVersion: v1
kind: Secret
metadata:
  name: redis-cart-credentials
  namespace: online-boutique
type: Opaque
stringData:
  password: "REPLACE_ME"
