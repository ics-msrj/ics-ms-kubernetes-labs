# __APP_DOMAIN__ is substituted by setup.sh from lab.env's APP_DOMAIN.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend
  namespace: online-boutique
spec:
  parentRefs:
    - name: frontend-gateway
      sectionName: https
  hostnames:
    - "__APP_DOMAIN__"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
