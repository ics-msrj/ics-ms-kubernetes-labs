# Static Helm values for Velero. Credentials (MinIO root user/password,
# generated fresh by setup.sh) are passed separately via --set-file, never
# committed here.
# velero-plugin-for-csi is deliberately NOT listed here — CSI backup/
# restore support (BackupItemActionV2 velero.io/csi-pvc-backupper etc.) is
# built into Velero core as of this chart's appVersion (1.18.1). Installing
# the old standalone plugin on top of it registers the same plugin name
# twice and crashes the pod outright: "unable to register plugin... because
# another plugin is already registered for this kind and name".
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.14.2
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    volumeMounts:
      - mountPath: /target
        name: plugins

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Helm creates this short-lived CRD upgrade Job during install. Module 06's
# policy requires explicit resources for Jobs as well as long-running Pods.
kubectl:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# snapshotsEnabled: false — the chart's own default (true) unconditionally
# renders a VolumeSnapshotLocation with an empty provider unless
# configuration.volumeSnapshotLocation is also set, which fails API
# validation outright ("spec.provider: Required value"). Not needed here
# anyway: EnableCSI below uses the VolumeSnapshot CRDs directly, not the
# legacy per-cloud snapshot-location mechanism this object belongs to.
snapshotsEnabled: false

configuration:
  # EnableCSI: use the VolumeSnapshot CRDs Module 05 already installed
  # (external-snapshotter) to back up PV data — not the AWS plugin's own
  # EBS-snapshot codepath, which is irrelevant here (MinIO isn't EBS, and
  # this cluster isn't running on AWS at all). The AWS plugin above is only
  # in play for its S3-compatible *object storage* client, talking to MinIO.
  features: EnableCSI
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero-backups
      default: true
      config:
        region: minio
        s3Url: http://minio.velero.svc:9000
        s3ForcePathStyle: "true"

credentials:
  useSecret: true
