# Deliberately honest about what this cluster can actually measure: Online
# Boutique's services expose no /metrics endpoint (no request-level golden
# signals — see Module 08's README), so "canary error rate" isn't a metric
# that exists here. What genuinely exists, from kube-state-metrics (Module
# 08), is container restart counts — a real, if coarser, signal: a canary
# that's crash-looping should never reach 100% traffic. A production setup
# with instrumented services would swap this query for a request-success-
# rate one; the AnalysisTemplate mechanism itself doesn't change.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: frontend-no-restarts
  namespace: online-boutique
spec:
  metrics:
    - name: no-restarts-during-canary
      interval: 30s
      # count is required, not optional, once this metric is referenced
      # from an inline canary `analysis` step (as opposed to a background
      # analysisRun, which can run indefinitely) — Argo Rollouts rejected
      # the Rollout outright with InvalidSpec until this was added: a
      # step-scoped analysis has to know when it's done. count: 3 gives
      # ~90s of checking (interval: 30s), inside the 60s pause step before
      # it that already lets the canary settle.
      count: 3
      # result is a []float64 (a Prometheus instant-vector result), not a
      # scalar — `result == 0` errored every measurement on a live
      # cluster: "invalid operation: == (mismatched types []float64 and
      # int)". result[0] fixes the type. Tried wrapping it in
      # default(0, result[0]) for the case where sum() matches zero
      # series (empty vector) — that measured 0 correctly but still
      # assessed Failed, so whatever that expr function's real semantics
      # are here, they weren't what's documented/expected; not confident
      # enough in why to keep it. Using the standard, well-documented
      # PromQL idiom instead: `OR on() vector(0)` guarantees the query
      # itself never returns an empty vector, so result[0] == 0 alone is
      # sufficient and needs no expression-level fallback.
      successCondition: result[0] == 0
      failureLimit: 1
      provider:
        prometheus:
          address: http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090
          query: |
            sum(increase(kube_pod_container_status_restarts_total{namespace="online-boutique", pod=~"frontend-.*"}[2m])) OR on() vector(0)
