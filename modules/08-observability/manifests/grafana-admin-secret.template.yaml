# Template only — DO NOT `kubectl apply` this file directly (placeholder
# values, safe to commit). setup.sh generates a real random password,
# seals it with kubeseal (Module 03's pattern), and applies the resulting
# SealedSecret instead. Keys must be admin-user/admin-password — that's
# what kube-prometheus-stack's grafana.admin.existingSecret expects.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
type: Opaque
stringData:
  admin-user: admin
  admin-password: "REPLACE_ME"
