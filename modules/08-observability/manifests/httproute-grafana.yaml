# Lives in the monitoring namespace (where the Grafana Service is) and
# attaches cross-namespace to the Gateway in online-boutique — allowed
# because gateway-grafana-listener.yaml's https-grafana listener sets
# allowedRoutes.namespaces.from: All. __GRAFANA_DOMAIN__ is substituted by
# setup.sh.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: frontend-gateway
      namespace: online-boutique
      sectionName: https-grafana
  hostnames:
    - "__GRAFANA_DOMAIN__"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: monitoring-grafana
          port: 80
